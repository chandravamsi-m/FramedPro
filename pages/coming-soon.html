<!DOCTYPE html>
<html lang="en" class="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coming Soon | FramedPro Corporate Photography</title>
  <meta name="description" content="FramedPro is launching soon. Sign up to be notified when we go live.">
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:'class',theme:{extend:{colors:{brand:{50:'#f9f8f6',500:'#c9a96e',900:'#1a1a1a'}},fontFamily:{display:['"Playfair Display"','serif'],body:['"Inter"','sans-serif']}}}}</script>
  <!-- Icon Libraries -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="font-body bg-gray-950 text-white min-h-screen flex flex-col items-center justify-center px-4 text-center">

  <!-- Background -->
  <div class="fixed inset-0 overflow-hidden" aria-hidden="true">
    <img src="https://images.unsplash.com/photo-1560250097-0b93528c311a?w=1600&q=60" alt="" class="w-full h-full object-cover opacity-10" width="1600" height="1067">
    <div class="absolute inset-0 bg-gradient-to-b from-gray-950/80 to-gray-950"></div>
  </div>

  <main class="relative z-10 max-w-2xl mx-auto" id="main-content">
    <!-- Logo -->
    <div class="mb-8">
      <span class="text-3xl font-bold" style="font-family:'Playfair Display',serif;">Framed<span class="text-amber-500">Pro</span></span>
    </div>

    <h1 class="font-display text-4xl sm:text-6xl font-bold mb-4 leading-tight">Something exceptional<br class="hidden sm:block"> is coming.</h1>
    <p class="text-gray-400 text-lg mb-10 max-w-lg mx-auto">Corporate headshot photography with a client portal that your HR team will actually love. Launching soon.</p>

    <!-- Countdown -->
    <div class="flex items-center justify-center gap-4 sm:gap-8 mb-12" aria-label="Countdown timer" id="countdown">
      <div class="text-center">
        <p class="text-4xl sm:text-5xl font-display font-bold text-white" id="cd-days">--</p>
        <p class="text-xs tracking-widest uppercase text-gray-500 mt-1">Days</p>
      </div>
      <div class="text-amber-700 text-3xl font-bold" aria-hidden="true">:</div>
      <div class="text-center">
        <p class="text-4xl sm:text-5xl font-display font-bold text-white" id="cd-hours">--</p>
        <p class="text-xs tracking-widest uppercase text-gray-500 mt-1">Hours</p>
      </div>
      <div class="text-amber-700 text-3xl font-bold" aria-hidden="true">:</div>
      <div class="text-center">
        <p class="text-4xl sm:text-5xl font-display font-bold text-white" id="cd-mins">--</p>
        <p class="text-xs tracking-widest uppercase text-gray-500 mt-1">Minutes</p>
      </div>
      <div class="text-amber-700 text-3xl font-bold" aria-hidden="true">:</div>
      <div class="text-center">
        <p class="text-4xl sm:text-5xl font-display font-bold text-white" id="cd-secs">--</p>
        <p class="text-xs tracking-widest uppercase text-gray-500 mt-1">Seconds</p>
      </div>
    </div>

    <!-- Email Capture -->
    <form action="#" method="POST" class="flex flex-col sm:flex-row gap-3 max-w-md mx-auto" aria-label="Email signup">
      <input type="text" name="_gotcha" style="display:none" tabindex="-1" autocomplete="off">
      <label for="cs-email" class="sr-only">Email address</label>
      <input type="email" id="cs-email" name="email" required placeholder="your@email.com"
        class="flex-1 bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500" style="font-size:16px;">
      <button type="submit" class="bg-amber-600 hover:bg-amber-500 text-white font-bold px-5 py-3 rounded-xl transition-all whitespace-nowrap">Notify Me</button>
    </form>
    <p class="text-xs text-gray-600 mt-3">No spam. One email when we launch.</p>

    <!-- Social -->
    <div class="flex items-center justify-center gap-4 mt-10">
      <a href="#" class="text-gray-600 hover:text-amber-400 transition-colors" aria-label="LinkedIn">
        <i data-lucide="linkedin" class="w-5 h-5"></i>
      </a>
      <a href="#" class="text-gray-600 hover:text-amber-400 transition-colors" aria-label="Instagram">
        <i data-lucide="instagram" class="w-5 h-5"></i>
      </a>
    </div>
  </main>

  <script src="../assets/js/main.js" defer></script>
  <script>
    // Countdown to launch date
    const LAUNCH = new Date('2025-06-01T09:00:00');
    function tick() {
      const now = new Date();
      const diff = LAUNCH - now;
      if (diff <= 0) { 
        document.getElementById('countdown').innerHTML = '<p class="text-xl text-amber-400 font-semibold flex items-center justify-center gap-2"><i data-lucide="party-popper" class="w-6 h-6"></i> We\'re Live!</p>'; 
        if (typeof lucide !== 'undefined') lucide.createIcons();
        return; 
      }
      const d = Math.floor(diff / 86400000);
      const h = Math.floor((diff % 86400000) / 3600000);
      const m = Math.floor((diff % 3600000) / 60000);
      const s = Math.floor((diff % 60000) / 1000);
      document.getElementById('cd-days').textContent  = String(d).padStart(2,'0');
      document.getElementById('cd-hours').textContent = String(h).padStart(2,'0');
      document.getElementById('cd-mins').textContent  = String(m).padStart(2,'0');
      document.getElementById('cd-secs').textContent  = String(s).padStart(2,'0');
    }
    tick();
    setInterval(tick, 1000);

    // Dark mode init
    const stored = localStorage.getItem('fp-theme');
    if (stored === 'dark' || (!stored && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    }

    // Lucide init
    document.addEventListener('DOMContentLoaded', function() {
      if (typeof lucide !== 'undefined') {
        lucide.createIcons();
      }
    });
  </script>
</body>
</html>
