  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Icon Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.410.0/dist/umd/lucide.min.js"></script>

  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/rtl.css">
  <link rel="stylesheet" href="../assets/css/dark-mode.css">
  <meta property="og:title" content="Coming Soon | FramedPro">
  <meta property="og:description" content="FramedPro is launching soon. Sign up to be notified when we go live.">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebPage",
    "name": "Coming Soon | FramedPro",

  }

<body class="font-body bg-gray-950 text-white min-h-screen flex flex-col items-center justify-center px-4 overflow-hidden py-10">

  <!-- Premium Backdrop -->
  <div class="fixed inset-0 z-0 overflow-hidden" aria-hidden="true">
    <img src="../assets/images/home-2-hero.png" alt="" class="w-full h-full object-cover opacity-20 scale-105 transition-transform duration-1000">
    <div class="absolute inset-0 bg-gradient-to-b from-gray-950/40 via-gray-950/80 to-gray-950"></div>
    <div class="absolute inset-0 bg-gradient-to-tr from-amber-600/5 to-transparent"></div>
  </div>

  <main class="relative z-10 max-w-3xl mx-auto text-center" id="main-content">
    <!-- Branding Block -->
    <div class="mb-8 flex justify-center items-center gap-3">
      <img src="../assets/images/logo.svg" alt="" class="w-9 h-9">
      <span class="text-2xl font-display font-bold tracking-tight">
        Framed<span class="text-amber-500">Pro</span>
      </span>
    </div>

    <!-- Main Message -->
    <div class="mb-10">
      <span class="text-amber-600 text-[9px] font-bold uppercase tracking-[0.4em] block mb-4">Launching Summer 2025</span>
      <h1 class="font-display text-4xl sm:text-6xl lg:text-7xl font-bold mb-4 leading-[1.05] tracking-tighter">
        Something <br> <span class="italic font-normal serif text-amber-600">Exceptional</span> <br> is coming.
      </h1>
      <p class="text-gray-400 text-base sm:text-lg font-light max-w-xl mx-auto leading-relaxed">
        Premium corporate headshots with a high-authority client portal designed for global HR teams. Precision, speed, and absolute visual identity.
      </p>
    </div>

    <!-- Professional Email Capture -->
    <div class="max-w-md mx-auto">
      <form action="#" method="POST" class="relative group mb-3">
        <div class="relative flex items-center">
          <input type="email" placeholder="Enter your email for early access" required
            class="w-full bg-white/[0.05] border border-white/10 rounded-full py-3.5 pl-7 pr-32 text-sm text-white focus:outline-none focus:ring-1 focus:ring-amber-600/50 focus:border-amber-600/50 focus:bg-white/[0.08] transition-all duration-300 placeholder:text-gray-600">
          <button type="submit"
            class="absolute right-1.5 top-1.5 bottom-1.5 px-6 rounded-full bg-amber-700 hover:bg-amber-600 text-white text-[10px] font-bold uppercase tracking-[0.2em] transition-all">
            NOTIFY ME
          </button>
        </div>
      </form>
      <p class="text-[10px] text-gray-600 font-bold uppercase tracking-widest">Zero spam. Secure early access.</p>
    </div>
  </main>

  <script src="../assets/js/main.js" defer></script>
</body>
</html>
