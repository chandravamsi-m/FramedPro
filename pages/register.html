<!DOCTYPE html>
<html lang="en" class="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | FramedPro</title>
  <link rel="icon" type="image/svg+xml" href="../assets/images/logo.svg">
  <meta name="description" content="Join the FramedPro corporate archive.">
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:'class',theme:{extend:{colors:{brand:{50:'#f9f8f6',500:'#c9a96e',900:'#1a1a1a'}},fontFamily:{display:['"Playfair Display"','serif'],body:['"Inter"','sans-serif']}}}}</script>
  <!-- Icon Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.410.0/dist/umd/lucide.min.js"></script>

  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/rtl.css">
  <link rel="stylesheet" href="../assets/css/dark-mode.css">
  <style>.auth-card{animation:slideUp .5s cubic-bezier(.22,1,.36,1) both}@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}</style>
  <meta property="og:title" content="Dashboard Access Form | FramedPro">
  <meta property="og:description" content="Request access to the FramedPro corporate client dashboard. Manage your company's headshot photography.">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebPage",
    "name": "Dashboard Access Form | FramedPro",
    "description": "Request access to the FramedPro corporate client dashboard."
  }
  </script>
</head>
<body class="font-body bg-white dark:bg-gray-950 text-gray-900 dark:text-white min-h-screen flex flex-col transition-colors duration-300">

  <!-- Persistent Sticky Header (Precision Synced) -->
  <header class="fixed top-0 inset-x-0 z-50 h-20 bg-white/80 dark:bg-gray-950/80 backdrop-blur-md transition-all duration-300">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-full flex items-center justify-between">
      <a href="../index.html" class="flex items-center gap-3 transition-all duration-300 transform hover:scale-105" aria-label="FramedPro Home">
        <img src="../assets/images/logo.svg" alt="" class="w-9 h-9 shrink-0">
        <span class="text-2xl sm:text-3xl font-display font-bold tracking-tight text-gray-900 dark:text-white">
          Framed<span class="text-amber-600">Pro</span>
        </span>
      </a>

      <div class="flex items-center gap-3">
        <!-- RTL/LTR Toggle (Precision Synced) -->
        <button data-dir-toggle
          class="flex px-3 py-1.5 border border-gray-200 dark:border-gray-700 rounded-lg text-gray-600 dark:text-gray-300 hover:border-amber-500 transition-all items-center justify-center min-w-[50px] bg-transparent"
          aria-label="Toggle text direction">
          <span class="dir-toggle-text text-[10px] font-bold uppercase tracking-widest">RTL</span>
        </button>

        <!-- Dark Mode Toggle (Precision Synced) -->
        <button data-theme-toggle
          class="p-2 rounded-lg text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors"
          aria-label="Toggle dark mode">
          <i data-lucide="moon" class="w-5 h-5 dark:hidden"></i>
          <i data-lucide="sun" class="w-5 h-5 hidden dark:block"></i>
        </button>
      </div>
    </div>
  </header>

  <main class="flex-1 flex flex-col items-center justify-center pt-32 pb-16 px-4" id="main-content">
    <div class="w-full max-w-lg mx-auto">
      <!-- Balanced Restored Auth Card -->
      <div class="bg-gray-100/50 dark:bg-gray-900/50 border border-gray-200 dark:border-gray-800 rounded-3xl p-6 xs:p-8 sm:p-10 auth-card shadow-2xl backdrop-blur-sm">
        <div class="text-center mb-10">
          <h1 class="font-display text-4xl font-bold mb-3 tracking-tight text-gray-900 dark:text-white">Sign Up</h1>
          <p class="text-gray-500 text-[10px] font-bold uppercase tracking-[0.3em] opacity-80">Create your account</p>
        </div>

        <!-- Professional Restructured Form -->
        <form action="user-dashboard.html" id="register-form" class="space-y-6">
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
            <div class="space-y-2">
              <label for="reg-first" class="block text-[10px] font-bold uppercase tracking-widest text-amber-600 ml-1 rtl:ml-0 rtl:mr-1">First Name</label>
              <input type="text" id="reg-first" required placeholder="Jane"
                class="w-full bg-white dark:bg-white/5 border border-gray-200 dark:border-gray-800 rounded-2xl py-3 px-6 text-sm text-gray-900 dark:text-white focus:outline-none focus:ring-1 focus:ring-amber-600/50 focus:border-amber-600/50 transition-all duration-300">
            </div>
            <div class="space-y-2">
              <label for="reg-last" class="block text-[10px] font-bold uppercase tracking-widest text-amber-600 ml-1 rtl:ml-0 rtl:mr-1">Last Name</label>
              <input type="text" id="reg-last" required placeholder="Doe"
                class="w-full bg-white dark:bg-white/5 border border-gray-200 dark:border-gray-800 rounded-2xl py-3 px-6 text-sm text-gray-900 dark:text-white focus:outline-none focus:ring-1 focus:ring-amber-600/50 focus:border-amber-600/50 transition-all duration-300">
            </div>
          </div>

          <div class="space-y-2">
            <label for="reg-email" class="block text-[10px] font-bold uppercase tracking-widest text-amber-600 ml-1 rtl:ml-0 rtl:mr-1">Work Email</label>
            <input type="email" id="reg-email" required placeholder="name@company.com"
              class="w-full bg-white dark:bg-white/5 border border-gray-200 dark:border-gray-800 rounded-2xl py-3 px-6 text-sm text-gray-900 dark:text-white focus:outline-none focus:ring-1 focus:ring-amber-600/50 focus:border-amber-600/50 transition-all duration-300">
          </div>

          <div class="space-y-2">
            <label for="reg-password" class="block text-[10px] font-bold uppercase tracking-widest text-amber-600 ml-1 rtl:ml-0 rtl:mr-1">Password</label>
            <div class="relative group">
              <input type="password" id="reg-password" required placeholder="********"
                class="w-full bg-white dark:bg-white/5 border border-gray-200 dark:border-gray-800 rounded-2xl py-3 px-6 pr-12 rtl:pr-6 rtl:pl-12 text-sm text-gray-900 dark:text-white focus:outline-none focus:ring-1 focus:ring-amber-600/50 focus:border-amber-600/50 transition-all duration-300">
              <button type="button" id="toggle-password" 
                class="absolute right-4 rtl:right-auto rtl:left-4 top-1/2 -translate-y-1/2 text-gray-400 dark:text-gray-600 hover:text-amber-600 dark:hover:text-amber-500 transition-colors p-1"
                aria-label="Toggle password visibility">
                <i data-lucide="eye" class="w-4 h-4" id="eye-icon"></i>
                <i data-lucide="eye-off" class="w-4 h-4 hidden" id="eye-off-icon"></i>
              </button>
            </div>
          </div>

          <div class="space-y-2">
            <label for="reg-confirm-password" class="block text-[10px] font-bold uppercase tracking-widest text-amber-600 ml-1 rtl:ml-0 rtl:mr-1">Confirm Password</label>
            <div class="relative group">
              <input type="password" id="reg-confirm-password" required placeholder="********"
                class="w-full bg-white dark:bg-white/5 border border-gray-200 dark:border-gray-800 rounded-2xl py-3 px-6 pr-12 rtl:pr-6 rtl:pl-12 text-sm text-gray-900 dark:text-white focus:outline-none focus:ring-1 focus:ring-amber-600/50 focus:border-amber-600/50 transition-all duration-300">
              <button type="button" id="toggle-confirm-password" 
                class="absolute right-4 rtl:right-auto rtl:left-4 top-1/2 -translate-y-1/2 text-gray-400 dark:text-gray-600 hover:text-amber-600 dark:hover:text-amber-500 transition-colors p-1"
                aria-label="Toggle confirm password visibility">
                <i data-lucide="eye" class="w-4 h-4" id="eye-icon-confirm"></i>
                <i data-lucide="eye-off" class="w-4 h-4 hidden" id="eye-off-icon-confirm"></i>
              </button>
            </div>
          </div>

          <button type="submit"
            class="w-full bg-amber-700 hover:bg-amber-800 text-white font-bold py-4 rounded-2xl text-[11px] uppercase tracking-[0.2em] transition-all shadow-xl shadow-amber-900/10 active:scale-[0.98] mt-4">
            Sign Up
          </button>
        </form>

        <!-- Social Auth Options -->
        <div class="mt-6 pt-6 border-t border-gray-300 dark:border-gray-800">
          <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
            <button class="flex items-center justify-center gap-3 py-3 rounded-2xl bg-white dark:bg-white/5 border border-gray-200 dark:border-gray-800 hover:bg-gray-100 dark:hover:bg-gray-800 hover:border-amber-600/30 transition-all duration-300 group" aria-label="Join with Google">
              <svg class="w-4 h-4" viewBox="0 0 24 24"><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/></svg>
              <span class="text-[9px] font-bold uppercase tracking-widest text-gray-600 dark:text-gray-300">Google</span>
            </button>
            <button class="flex items-center justify-center gap-3 py-3 rounded-2xl bg-white dark:bg-white/5 border border-gray-200 dark:border-gray-800 hover:bg-gray-100 dark:hover:bg-gray-800 hover:border-amber-600/30 transition-all duration-300 group" aria-label="Join with Apple">
              <svg class="w-4 h-4 fill-current text-gray-900 dark:text-white" viewBox="0 0 384 512"><path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"/></svg>
              <span class="text-[9px] font-bold uppercase tracking-widest text-gray-600 dark:text-gray-300">Apple</span>
            </button>
            <button class="flex items-center justify-center gap-3 py-3 rounded-2xl bg-white dark:bg-white/5 border border-gray-200 dark:border-gray-800 hover:bg-gray-100 dark:hover:bg-gray-800 hover:border-amber-600/30 transition-all duration-300 group" aria-label="Join with Facebook">
              <svg class="w-4 h-4" viewBox="0 0 24 24" fill="#1877F2"><path d="M24 12.073C24 5.421 18.627 0 12 0S0 5.421 0 12.073c0 6.012 4.388 11.002 10.125 11.91V15.4h-3.047V12.07h3.047V9.528c0-3.007 1.792-4.668 4.533-4.668 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.329h-2.796v8.582C19.612 23.075 24 18.085 24 12.073z"/></svg>
              <span class="text-[9px] font-bold uppercase tracking-widest text-gray-600 dark:text-gray-300">Facebook</span>
            </button>
          </div>
        </div>

        <div class="mt-8 text-center text-[10px] font-bold uppercase tracking-widest">
          <p class="text-gray-500">
            Already have an account? 
            <a href="login.html" class="text-amber-700 dark:text-amber-500 hover:underline ml-1 font-bold transition-colors underline-offset-4">Sign In</a>
          </p>
        </div>
      </div>

      <!-- Professional Bottom Branding -->
      <div class="mt-12 text-center text-[10px] font-bold uppercase tracking-[0.4em] text-gray-400 opacity-60">
        <p>© 2025 FramedPro Studio Archive</p>
      </div>
    </div>
  </main>

  <script src="../assets/js/main.js" defer></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      if (typeof lucide !== 'undefined') lucide.createIcons();
      const form = document.getElementById('register-form');
      if (form) {
        form.addEventListener('submit', function(e) { e.preventDefault(); window.location.href = 'user-dashboard.html'; });
      }

      // Password Toggle Logic
      const toggleBtn = document.getElementById('toggle-password');
      const passInput = document.getElementById('reg-password');
      const eyeIcon = document.getElementById('eye-icon');
      const eyeOffIcon = document.getElementById('eye-off-icon');

      if (toggleBtn && passInput) {
        toggleBtn.addEventListener('click', () => {
          const isPass = passInput.type === 'password';
          passInput.type = isPass ? 'text' : 'password';
          eyeIcon.classList.toggle('hidden', isPass);
          eyeOffIcon.classList.toggle('hidden', !isPass);
        });
      }

      // Confirm Password Toggle Logic
      const toggleConfirmBtn = document.getElementById('toggle-confirm-password');
      const confirmPassInput = document.getElementById('reg-confirm-password');
      const eyeIconConfirm = document.getElementById('eye-icon-confirm');
      const eyeOffIconConfirm = document.getElementById('eye-off-icon-confirm');

      if (toggleConfirmBtn && confirmPassInput) {
        toggleConfirmBtn.addEventListener('click', () => {
          const isPass = confirmPassInput.type === 'password';
          confirmPassInput.type = isPass ? 'text' : 'password';
          eyeIconConfirm.classList.toggle('hidden', isPass);
          eyeOffIconConfirm.classList.toggle('hidden', !isPass);
        });
      }
    });
  </script>
</body>
</html>
